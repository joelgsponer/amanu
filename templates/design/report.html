<!DOCTYPE html>
<!--
  amanu HTML output template — Basel School / Armin Hofmann tradition.
  Self-contained (inline CSS, no external assets, local-first). Concrete default for
  the core /healthcheck report; static-site / report-export reuse the same <style>.
  Form is built from point·line·plane, animated by contrast (a light display set
  against bold tracked labels), reduced to the economy of means (no radius, no
  shadow), with activated white space and black-&-white + one structural red.
  The CSS mirrors design/tokens.css — keep them in sync. Fill the {{PLACEHOLDERS}}
  and repeat the row pattern.
-->
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{{TITLE}} — {{DATE}}</title>
<style>
  :root{
    --font-sans:"Helvetica Neue","Helvetica","Inter",Arial,system-ui,sans-serif;
    --font-mono:"SF Mono","JetBrains Mono",Menlo,ui-monospace,monospace;
    --ink:#0a0a0a;--ink-soft:#565656;--paper:#f6f5f1;--panel:#fff;--line:#d7d5cd;
    --accent:#e2231a;--ok:#1f7a3d;--ok-bg:#eaf2ec;--warn:#8a6400;--warn-bg:#f4eedd;
    --fail:#e2231a;--fail-bg:#fae7e5;--track:0.16em;
  }
  @media (prefers-color-scheme:dark){:root{
    --ink:#f2f0ea;--ink-soft:#a6a39b;--paper:#0c0c0b;--panel:#161513;--line:#2c2b27;
    --ok:#5fcf83;--ok-bg:#15241a;--warn:#d9ab3c;--warn-bg:#271f0e;--fail-bg:#2a1312;}}
  *{box-sizing:border-box}
  body{margin:0;background:var(--paper);color:var(--ink);font-family:var(--font-sans);
       line-height:1.5;font-size:16px;-webkit-font-smoothing:antialiased}
  .wrap{max-width:860px;margin:0 auto;padding:64px 24px 96px}
  /* PLANE — a solid black band tops the page (mass). */
  header{border-top:4px solid var(--ink);padding-top:24px;margin-bottom:64px}
  .kicker{font-size:.78rem;letter-spacing:var(--track);text-transform:uppercase;
          font-weight:700;color:var(--ink-soft);margin:0 0 24px}
  /* CONTRAST — light, large display against bold tracked labels below. */
  h1{font-size:3.157rem;line-height:1.05;font-weight:300;letter-spacing:-.01em;margin:0}
  .meta{color:var(--ink-soft);font-size:.875rem;margin-top:16px;
        letter-spacing:.04em;text-transform:uppercase}
  /* status banner — a structural bar, square, heavy left edge (LINE → PLANE). */
  .banner{display:flex;align-items:baseline;gap:20px;padding:20px 24px;margin-bottom:64px;
          border-left:6px solid currentColor;background:var(--panel)}
  .banner.ok{color:var(--ok);background:var(--ok-bg)}
  .banner.warn{color:var(--warn);background:var(--warn-bg)}
  .banner.fail{color:var(--fail);background:var(--fail-bg)}
  .banner b{font-size:1.333rem;font-weight:700;letter-spacing:.02em;text-transform:uppercase}
  .banner span{color:var(--ink)}
  section.grp{margin-bottom:48px}
  /* LINE — a structural rule under each heading. */
  h2{font-size:1.333rem;font-weight:700;margin:0 0 16px;padding-bottom:8px;
     border-bottom:2px solid var(--ink);letter-spacing:.01em}
  table{width:100%;border-collapse:collapse;font-size:.95rem}
  /* hairline dividers — the LINE element at its lightest. */
  td{padding:12px 8px;border-bottom:1px solid var(--line);vertical-align:top}
  td.s{width:104px;white-space:nowrap}
  /* POINT — a tight square pill; tracked caps, no radius. */
  .pill{display:inline-block;padding:3px 9px;border:1px solid currentColor;
        font-size:.7rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase}
  .pill.ok{color:var(--ok)} .pill.warn{color:var(--warn)} .pill.fail{color:var(--fail)}
  .hint{color:var(--ink-soft);font-size:.85rem}
  code{font-family:var(--font-mono);font-size:.85em;background:var(--panel);
       border:1px solid var(--line);padding:1px 5px}
  footer{margin-top:96px;padding-top:16px;border-top:1px solid var(--line);
         color:var(--ink-soft);font-size:.78rem;letter-spacing:.03em}
</style>
</head>
<body>
  <div class="wrap">
    <header>
      <p class="kicker">amanu · system health-check</p>
      <h1>{{TITLE}}</h1>
      <p class="meta">{{DATE}} &nbsp;·&nbsp; tier {{TIER}}</p>
    </header>

    <!-- banner class is one of ok|warn|fail -->
    <div class="banner {{STATUS}}"><b>{{STATUS_LABEL}}</b><span>{{SUMMARY}}</span></div>

    <!-- Repeat one <section> per checked area; each row's pill is ok|warn|fail. -->
    <section class="grp">
      <h2>{{SECTION_NAME}}</h2>
      <table>
        <tr>
          <td class="s"><span class="pill {{ROW_STATUS}}">{{ROW_STATUS_LABEL}}</span></td>
          <td>{{ROW_CHECK}}<br><span class="hint">{{ROW_HINT}}</span></td>
        </tr>
        <!-- …more rows… -->
      </table>
    </section>

    <footer>Generated by <code>/healthcheck</code> — reports only, never auto-fixes. Basel-school design system.</footer>
  </div>
</body>
</html>
